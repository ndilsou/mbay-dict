services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mbay
      POSTGRES_USER: mbay
      POSTGRES_PASSWORD: mbay
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbay"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
